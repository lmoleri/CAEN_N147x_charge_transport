name: Build Windows executable

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write   # required to attach the zip to a Release on tag push

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: 2026_Python_version

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests (headless)
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest

      - name: Build one-folder bundle
        run: pyinstaller --noconfirm THGEM_GUI.spec

      - name: Smoke-test the frozen app (Plotly render)
        shell: pwsh
        continue-on-error: true   # first run: report render result without blocking the artifact
        env:
          QT_QPA_PLATFORM: offscreen
          QTWEBENGINE_DISABLE_SANDBOX: '1'
          QTWEBENGINE_CHROMIUM_FLAGS: '--no-sandbox --disable-gpu --disable-gpu-compositing'
        run: |
          $exe = Join-Path $PWD "dist\THGEM_GUI\THGEM_GUI.exe"
          $p = Start-Process -FilePath $exe -ArgumentList "--selftest" -Wait -PassThru
          Write-Host "frozen --selftest exit code: $($p.ExitCode)"
          if ($p.ExitCode -ne 0) { throw "Frozen --selftest failed (exit $($p.ExitCode))" }

      - name: Zip bundle
        shell: pwsh
        run: Compress-Archive -Path dist/THGEM_GUI -DestinationPath THGEM_GUI-windows.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: THGEM_GUI-windows
          path: 2026_Python_version/THGEM_GUI-windows.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: 2026_Python_version/THGEM_GUI-windows.zip
